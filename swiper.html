<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動照片影片成果展</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0; /* 改為 0，讓橫幅可以貼緊最上方 */
            display: flex;
            flex-direction: column; /* 讓橫幅與主內容垂直排列 */
            align-items: center;
            min-height: 100vh;
        }

        /* 💡 新增：卓越級榮譽橫幅樣式 */
        .honor-banner {
            width: 100%;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); /* 典雅深藍漸層 */
            color: #ffffff;
            text-align: center;
            padding: 18px 10px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border-bottom: 4px solid #d4af37; /* 金色下邊框，象徵卓越級榮譽 */
            box-sizing: border-box;
        }

        /* 讓文字中的 (卓越級) 變成耀眼的金色 */
        .honor-banner span {
            color: #ffd700; 
            margin-left: 5px;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
        }

        /* 主內容容器調整 */
        .container {
            width: 100%;
            max-width: 850px;
            background: #fff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin: 30px 20px; /* 加上上下邊距，與橫幅保持舒適距離 */
            box-sizing: border-box;
        }

        /* 頁籤切換按鈕區域 */
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .tab-btn {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            background: #e4e6eb;
            color: #050505;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: #007bff;
            color: #fff;
        }

        /* 精彩影片花絮按鈕 */
        .video-highlight-btn {
            background: #ff0000;
            color: #fff;
            margin-left: auto;
            box-shadow: 0 4px 10px rgba(255, 0, 0, 0.3);
            animation: pulse 2s infinite;
        }
        .video-highlight-btn.active {
            background: #28a745;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); box-shadow: 0 4px 15px rgba(255, 0, 0, 0.5); }
            100% { transform: scale(1); }
        }

        /* 內容顯示/隱藏控制 */
        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        /* 播放器與輪播大小控制 */
        .media-box {
            width: 100%;
            height: 500px;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }

        .swiper {
            width: 100%;
            height: 100%;
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .swiper-slide iframe, .youtube-box iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Swiper 控制鈕優化 */
        .swiper-button-next, .swiper-button-prev {
            color: #fff;
            background: rgba(0, 0, 0, 0.6);
            width: 45px;
            height: 45px;
            border-radius: 50%;
        }
        .swiper-button-next::after, .swiper-button-prev::after {
            font-size: 18px;
        }
        .swiper-pagination-bullet-active {
            background: #007bff !important;
        }

        /* 手機板字體自動縮小，避免斷行 */
        @media (max-width: 600px) {
            .honor-banner {
                font-size: 18px;
                padding: 12px 5px;
            }
            .media-box {
                height: 300px; /* 手機版高度縮小，比較好觀看 */
            }
        }
    </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    const swipers = {};

    // 初始化所有 Swiper 輪播
    swipers['multiculture'] = new Swiper('.swiper-multi', {
        loop: true, speed: 600,
        autoplay: { delay: 5000, disableOnInteraction: true },
        pagination: { el: '.swiper-multi .swiper-pagination', clickable: true },
        navigation: { nextEl: '.swiper-multi .swiper-button-next', prevEl: '.swiper-multi .swiper-button-prev' }
    });

    swipers['summit'] = new Swiper('.swiper-summit', {
        loop: true, speed: 600,
        autoplay: { delay: 5000, disableOnInteraction: true },
        pagination: { el: '.swiper-summit .swiper-pagination', clickable: true },
        navigation: { nextEl: '.swiper-summit .swiper-button-next', prevEl: '.swiper-summit .swiper-button-prev' }
    });

    swipers['jphk'] = new Swiper('.swiper-jphk', {
        loop: true, speed: 600,
        autoplay: { delay: 5000, disableOnInteraction: true },
        pagination: { el: '.swiper-jphk .swiper-pagination', clickable: true },
        navigation: { nextEl: '.swiper-jphk .swiper-button-next', prevEl: '.swiper-jphk .swiper-button-prev' }
    });

    function switchTab(tabId) {
        document.getElementById('youtubePlayerContainer').innerHTML = "";
        Object.values(swipers).forEach(s => s.autoplay.stop());

        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = Array.from(document.querySelectorAll('.tab-btn')).find(btn => btn.getAttribute('onclick').includes(tabId));
        if(activeBtn) activeBtn.classList.add('active');

        document.querySelectorAll('.content-section').forEach(section => section.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');

        if (swipers[tabId]) {
            swipers[tabId].update();
            swipers[tabId].autoplay.start();
        }
    }

    function playRandomYouTube() {
        Object.values(swipers).forEach(s => s.autoplay.stop());

        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector('.video-highlight-btn').classList.add('active');

        document.querySelectorAll('.content-section').forEach(section => section.classList.remove('active'));
